    (function () {
      const root = document.getElementById(&quot;jn-hospital-building-switch-demo&quot;);

      const floorPlan = root.querySelector(&quot;.floor-plan&quot;);
      const toast = root.querySelector(&quot;.toast&quot;);
      let toastTimer = null;

      function iconPathFor(floor) {
        return floor.includes(&quot;B&quot;) ? &quot;↓&quot; : floor;
      }

      function renderFloors(floors) {
        floorSwitch.innerHTML = &quot;&quot;;
        floors.forEach((floor, index) =&gt; {
          const button = document.createElement(&quot;button&quot;);
          button.type = &quot;button&quot;;
          button.textContent = iconPathFor(floor);
          button.setAttribute(&quot;aria-label&quot;, `切换到${floor}`);
          if (index === Math.min(1, floors.length - 1)) {
            button.className = &quot;active&quot;;
          }
          button.addEventListener(&quot;click&quot;, () =&gt; {
            floorSwitch.querySelectorAll(&quot;button&quot;).forEach((item) =&gt; item.classList.remove(&quot;active&quot;));
            button.classList.add(&quot;active&quot;);
            showToast(`已切换至 ${current.textContent} ${floor}`);
          });
          floorSwitch.appendChild(button);
        });
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add(&quot;show&quot;);
        window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(() =&gt; toast.classList.remove(&quot;show&quot;), 1500);
      }

      function closePanel() {
        panel.classList.remove(&quot;open&quot;);
        selectButton.setAttribute(&quot;aria-expanded&quot;, &quot;false&quot;);
      }

      selectButton.addEventListener(&quot;click&quot;, () =&gt; {
        const open = !panel.classList.contains(&quot;open&quot;);
        panel.classList.toggle(&quot;open&quot;, open);
        selectButton.setAttribute(&quot;aria-expanded&quot;, String(open));
      });

        option.addEventListener(&quot;click&quot;, () =&gt; {
          root.querySelectorAll(&quot;.building-option&quot;).forEach((item) =&gt; {

            item.setAttribute(&quot;aria-selected&quot;, &quot;false&quot;);

          floorPlan.style.transform = &quot;perspective(520px) rotateX(10deg) scale(.98)&quot;;

        if (event.key === &quot;Escape&quot;) {
          closePanel();
        }
      });

        const url = new URL(rawHref, document.baseURI);
        if (url.protocol !== "https:") {
          return;
        }
        href = url.href;
      } catch {
        return;
      }
      if (globalThis.navigator.userActivation?.isActive === true) {
        const anchor = document.createElement("a");
        anchor.href = href;
        anchor.rel = "noopener noreferrer";
        anchor.target = "_blank";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }
      return;
    }
    if (data.type === "follow-up") {
      const prompt = data.prompt;
      if (
        typeof prompt !== "string" ||
        globalThis.navigator.userActivation?.isActive !== true
      ) {
        return;
      }
      const title = data.title;
      globalThis.prompt(typeof title === "string" ? title : prompt, prompt);
    }
  });
  channel.port1.start();
  const srcdoc = frame.dataset.srcdoc;
  if (srcdoc == null) {
    return;
  }
  globalThis.addEventListener("resize", () => {
    const height = Number.parseFloat(frame.style.height);
    if (!Number.isFinite(height) || height <= viewportHeight) {
      frame.style.removeProperty("height");
    }
    viewportHeight = globalThis.innerHeight;
    channel.port1.postMessage({ type: "measure" });
  });
  frame.addEventListener(
    "load",
    () => {
      frame.contentWindow?.postMessage(
        { type: "codex-visualization-initialize" },
        "*",
        [channel.port2],
      );
    },
    { once: true },
  );
  frame.srcdoc = srcdoc;
  delete frame.dataset.srcdoc;
})();
</script>
